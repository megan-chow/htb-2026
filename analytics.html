<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="./src/style.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiko:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>GitHub Insights</title>
  </head>

  <body class="page">
    <div id="loading-overlay">
      <div id="wrap"></div>
      <h1 class="info">Loading...</h1>
    </div>

    <header class="header">
      <div id="logo">
        <a href="index.html">
          <img
            src="/mahv.png"
            style="height: 120px; width: 220px; filter: opacity(80%)"
          />
        </a>
      </div>
      <div id="searchbar">
        <img src="./gitico.png" />
        <div id="search">
          <input
            id="repoInput"
            placeholder="Enter GitHub repository URL"
            value=""
          />
        </div>
        <button id="generateBtn">
          <img src="./search.png" />
        </button>
        <pre id="output" style="display: none"></pre>
      </div>
    </header>

    <main id="main">
      <div id="userBoard">
        <div class="userTabslist">Loading...</div>
      </div>
      <div id="statsPage">
        <div class="split">
          <div id="repo-tab">
            <div class="tab" id="tab-repo">Repo Overview</div>
          </div>
          <div id="user-tabs">
            <div class="tab" id="tab-overview">User Overview</div>
            <div class="tab" id="tab-commits">Commits</div>
            <div class="tab" id="tab-pr">Pull Requests</div>
            <!-- <div class="tab">CHUD</div> -->
          </div>
        </div>

        <div id="stats"></div>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r77/three.min.js"></script>
    <script type="module" src="/src/analytics.js"></script>
  </body>
</html>
